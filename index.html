  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --ig-bg: #fafafa;
      --ig-card: #ffffff;
      --ig-border: #dbdbdb;
      --ig-text: #262626;
      --ig-text-secondary: #8e8e8e;
      --ig-blue: #0095f6;
      --ig-gradient-start: #f09433;
      --ig-gradient-mid: #e6683c;
      --ig-gradient-end: #bc1888;
      --story-ring: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--ig-bg);
      color: var(--ig-text);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    
    /* Header */
    .header {
      position: sticky;
      top: 0;
      background: var(--ig-card);
      border-bottom: 1px solid var(--ig-border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    
    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: var(--story-ring);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header-icons {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    .header-icons svg {
      width: 24px;
      height: 24px;
      cursor: pointer;
      stroke: var(--ig-text);
      fill: none;
      stroke-width: 2;
    }
    
    /* Stories */
    .stories-container {
      background: var(--ig-card);
      border-bottom: 1px solid var(--ig-border);
      padding: 16px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    
    .stories-container::-webkit-scrollbar { display: none; }
    
    .stories {
      display: flex;
      gap: 18px;
      padding: 0 16px;
    }
    
    .story {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }
    
    .story-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      padding: 3px;
      background: var(--story-ring);
      position: relative;
    }
    
    .story-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      background: #f0f0f0;
    }
    
    .story-name {
      font-size: 11px;
      color: var(--ig-text);
      max-width: 64px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .story-add {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      background: var(--ig-blue);
      border-radius: 50%;
      border: 2.5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }
    
    /* Feed */
    .feed {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    
    @media (max-width: 640px) {
      .feed {
        grid-template-columns: 1fr;
        padding: 8px;
      }
    }
    
    .post {
      background: var(--ig-card);
      border: 1px solid var(--ig-border);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .post:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    
    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
    }
    
    .post-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--story-ring);
      padding: 2px;
    }
    
    .post-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--ig-text-secondary);
      border: 2px solid white;
    }
    
    .post-meta {
      flex: 1;
    }
    
    .post-author {
      font-size: 13px;
      font-weight: 600;
      color: var(--ig-text);
    }
    
    .post-location {
      font-size: 11px;
      color: var(--ig-text-secondary);
    }
    
    .post-more {
      font-size: 16px;
      color: var(--ig-text-secondary);
      cursor: pointer;
    }
    
    .post-image {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    
    .post-image::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.03) 10px,
        rgba(255,255,255,0.03) 20px
      );
      animation: shimmer 20s linear infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }
    
    .post-image span {
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .post-actions {
      display: flex;
      justify-content: space-between;
      padding: 12px 14px 8px;
    }
    
    .post-actions-left {
      display: flex;
      gap: 14px;
    }
    
    .post-actions svg {
      width: 24px;
      height: 24px;
      cursor: pointer;
      stroke: var(--ig-text);
      fill: none;
      stroke-width: 2;
    }
    
    .post-actions svg.filled {
      fill: #ed4956;
      stroke: #ed4956;
    }
    
    .post-likes {
      padding: 0 14px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .post-caption {
      padding: 6px 14px 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    
    .post-caption .username {
      font-weight: 600;
      margin-right: 4px;
    }
    
    .post-caption .hashtag {
      color: var(--ig-blue);
      cursor: pointer;
    }
    
    .post-time {
      padding: 0 14px 12px;
      font-size: 10px;
      color: var(--ig-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--ig-card);
      border-top: 1px solid var(--ig-border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 12px;
      z-index: 100;
    }
    
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      color: var(--ig-text);
    }
    
    .bottom-nav-item svg {
      width: 24px;
      height: 24px;
      stroke: var(--ig-text);
      fill: none;
      stroke-width: 2;
    }
    
    .bottom-nav-item.active svg {
      stroke: var(--ig-text);
      fill: var(--ig-text);
    }
    
    .bottom-nav-item span {
      font-size: 10px;
      color: var(--ig-text-secondary);
    }
    
    .bottom-nav-item.active span {
      color: var(--ig-text);
      font-weight: 500;
    }
    
    .nav-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--story-ring);
      padding: 1.5px;
    }
    
    .nav-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #f0f0f0;
      border: 1.5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
    }
    
    /* Category Filter Active */
    .story.active .story-avatar {
      background: var(--ig-text);
    }
    
    .story.active .story-name {
      color: var(--ig-text);
      font-weight: 600;
    }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ig-text-secondary);
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--ig-border);
      margin-bottom: 16px;
    }
    
    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

          <div class="post-likes">${post.likes} 次收藏</div>
          <div class="post-caption">
            <span class="username">${post.categoryName}</span>
            ${post.caption}
            <span class="hashtag"> #${post.category}</span>
          </div>
          <div class="post-time">${post.time}</div>
        </article>
      `).join('');
    }

    function filterPosts(category) {
      // Update active story
      document.querySelectorAll('.story').forEach(s => s.classList.remove('active'));
      document.querySelector(`[data-category="${category}"]`).classList.add('active');
      
      // Render filtered posts
      renderPosts(category);
    }

    // Initial render
    renderPosts('all');
  </script>

</body>
</html>
