<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运哥 - 个人主页</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  .bg .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: .4;
    animation: float 8s ease-in-out infinite;
  }
  .bg .orb:nth-child(1) {
    width: 400px; height: 400px;
    background: #667eea;
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .bg .orb:nth-child(2) {
    width: 350px; height: 350px;
    background: #f093fb;
    bottom: -80px; right: -80px;
    animation-delay: -3s;
  }
  .bg .orb:nth-child(3) {
    width: 250px; height: 250px;
    background: #4facfe;
    top: 50%; left: 60%;
    animation-delay: -5s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 2px;
    box-shadow: 0 8px 24px rgba(102,126,234,.4);
  }

  .name {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .handle {
    font-size: 14px;
    color: rgba(255,255,255,.45);
    margin-bottom: 20px;
    font-weight: 300;
  }

  .bio {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(255,255,255,.7);
    margin-bottom: 32px;
    padding: 0 8px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .links a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px 20px;
    border-radius: 14px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.08);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: all .25s;
  }
  .links a:hover {
    background: rgba(255,255,255,.14);
    border-color: rgba(255,255,255,.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,.2);
  }
  .links a .icon { font-size: 18px; }

  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: rgba(255,255,255,.2);
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(0,184,148,.15);
    border: 1px solid rgba(0,184,148,.2);
    font-size: 12px;
    color: #00b894;
    margin-bottom: 24px;
  }
  .status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00b894;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="card">
  <div class="avatar">运</div>
  <div class="name">运哥</div>
  <div class="handle">@yun · AI Explorer</div>
  
  <div class="status">
    <span class="dot"></span>
    正在探索 AI 的无限可能
  </div>

  <div class="bio">
    技术爱好者 / AI 实践者<br>
    用 AI 构建有趣的东西 🚀
  </div>

  <div class="links">
    <a href="https://t.me/" target="_blank">
      <span class="icon">✈️</span> Telegram
    </a>
    <a href="https://github.com/" target="_blank">
      <span class="icon">🐙</span> GitHub
    </a>
    <a href="https://youtube.com/" target="_blank">
      <span class="icon">▶️</span> YouTube
    </a>
    <a href="mailto:hi@zhangyun.xyz">
      <span class="icon">📮</span> 联系我
    </a>
  </div>

  <div class="footer">⚡ Powered by OpenClaw</div>
</div>

</body>
</html>
